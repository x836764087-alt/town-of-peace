  else _origOnDataReady(d);
  expandDashboard(d);
};

/* === Phase 5: Enhanced Search === */
let _searchTimeout = null;
document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  const data = window.__STATE__._data;
  if (!data || !data.agents) return;
  
  // Clear previous dropdown
  const oldDrop = document.getElementById('search-dropdown');
  if (oldDrop) oldDrop.remove();
  if (_searchTimeout) clearTimeout(_searchTimeout);
  
  if (!q) return;
  
  _searchTimeout = setTimeout(() => {
    const matches = data.agents
      .filter(a => a.name.toLowerCase().includes(q))
      .slice(0, 10);
    if (!matches.length) return;
    
    const input = document.getElementById('searchInput');
    const rect = input.getBoundingClientRect();
    const drop = document.createElement('div');
    drop.id = 'search-dropdown';
    drop.style.cssText = `
      position: fixed; top: ${rect.bottom + 4}px; right: ${document.body.clientWidth - rect.right}px;
      width: ${rect.width}px; max-height: 300px; overflow-y: auto;
      background: var(--bg-panel); border: 1px solid var(--wood-light);
      border-radius: 4px; z-index: 2000; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    `;
    for (const a of matches) {
      const item = document.createElement('div');
      item.style.cssText = 'padding: 6px 10px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between;';
      const status = a.alive !== false ? '健在' : '已故';
      const years = a.age ? `${a.age}岁` : '';
      item.innerHTML = `<span>${a.name}${a.title ? ' · '+a.title : ''}</span><span style="color:#999;font-size:11px">${status} ${years}</span>`;
      item.onmouseenter = () => { item.style.background = 'var(--bg-card)'; };
      item.onmouseleave = () => { item.style.background = 'transparent'; };
      item.onclick = () => { showAgentModal(a); drop.remove(); document.getElementById('searchInput').value = ''; };
      drop.appendChild(item);
    }
    document.body.appendChild(drop);
    
    // Close dropdown on outside click
    const closeDrop = (ev) => {
      if (!drop.contains(ev.target) && ev.target !== input) {
        drop.remove(); document.removeEventListener('click', closeDrop);
      }
    };
    setTimeout(() => document.addEventListener('click', closeDrop), 10);
  }, 150);
});

/* === Phase 5: Chronicle Year Filter === */
function addChronicleFilter() {
  const header = document.querySelector('#chronicle-panel .panel-header');
  if (!header) return;
  const select = document.createElement('select');
  select.style.cssText = 'margin-left:8px;background:var(--bg-panel);color:var(--text-on-dark);border:1px solid var(--border-color);border-radius:3px;font-size:11px;padding:1px 4px;';
  select.innerHTML = '<option value="">全部年份</option>';
  const data = window.__STATE__._data;
  if (data && data.chronicle) {
    const years = [...new Set(data.chronicle.map(e => e.year))].sort((a,b) => b-a);
    years.forEach(y => {
      const opt = document.createElement('option');
      opt.value = y; opt.textContent = `Y${y}`;
      select.appendChild(opt);
    });
  }
  select.addEventListener('change', (e) => {
    const year = e.target.value;
    const data = window.__STATE__._data;
    if (!data || !data.chronicle) return;
    const filtered = year ? data.chronicle.filter(ent => ent.year === parseInt(year)) : data.chronicle;
    renderChronicle(filtered);
  });
  header.appendChild(select);
  header.style.display = 'flex';
  header.style.alignItems = 'center';
}

const _origOnDataReady3 = onDataReady;
onDataReady = function(d) {
  if (typeof _origOnDataReady3 === 'function') _origOnDataReady3(d);
  else onDataReady(d);
  addChronicleFilter();
  // Notify latest chronicle entry
  if (d.chronicle && d.chronicle.length) {
    const last = d.chronicle[d.chronicle.length - 1];
    notify('Year ' + last.year + ': ' + last.content, 'event');
  }
};

/* === Phase D: Notification === */
function notify(message, type) {
  if (!type) type = 'info';
  const feed = document.getElementById('notification-feed');
  if (!feed) return;
  const colors = { info: '#3498db', event: '#f1c40f', death: '#e74c3c' };
  const el = document.createElement('div');
  el.style.cssText = 'background:var(--bg-panel);border-left:3px solid ' + (colors[type] || colors.info) + ';padding:6px 10px;border-radius:3px;font-size:12px;color:var(--text-on-dark);transform:translateX(100%);opacity:0;transition:all 0.3s ease;box-shadow:0 2px 8px rgba(0,0,0,0.3);';
  el.textContent = message;
  feed.appendChild(el);
  while (feed.children.length > 3) feed.removeChild(feed.firstChild);
  requestAnimationFrame(function() { el.style.transform = 'translateX(0)'; el.style.opacity = '1'; });
  setTimeout(function() {
    el.style.transform = 'translateX(100%)';
    el.style.opacity = '0';
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
  }, 3000);
}

/* === Phase D: Tab Switching === */
(function initTabs() {
  document.querySelectorAll('#chronicle-panel .tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#chronicle-panel .tab-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      const tab = btn.getAttribute('data-tab');
      document.getElementById('chronicle-list').style.display = tab === 'chronicle' ? '' : 'none';
      document.getElementById('relationship-view').style.display = tab === 'relation' ? 'block' : 'none';
    });
  });
})();

/* === Phase E-2: Timeline === */
(function initTimeline() {
  const slider = document.getElementById('tlSlider');
  const label = document.getElementById('tlLabel');
  if (!slider || !label) return;
  
  // Hook into onDataReady to set max year from actual data
  const _origOnDataReady_tl = onDataReady;
  onDataReady = function(d) {
    if (typeof _origOnDataReady_tl === 'function') _origOnDataReady_tl(d);
    else onDataReady(d);
    if (d && d.chronicle && d.chronicle.length) {
      const maxYear = Math.max(...d.chronicle.map(e => e.year));
      slider.max = maxYear;
      slider.value = maxYear;
      label.textContent = 'Year ' + maxYear;
    }
  };
  
  slider.addEventListener('input', function() {
    const year = parseInt(this.value);
    label.textContent = 'Year ' + year;
    const data = window.__STATE__._data;
    if (!data || !data.chronicle) return;
    const filtered = data.chronicle.filter(e => e.year <= year);
    if (typeof renderChronicle === 'function') renderChronicle(filtered);
  });
})();

/* === Init === */
loadData();
</script>
<!-- === Phase E-2: Timeline Slider === -->
<div id="timeline-control" style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.55);padding:4px 14px;border-radius:8px;border:1px solid var(--border-color);">
  <span id="tlLabel" style="color:var(--accent-gold);font-size:12px;min-width:60px;">Year 0</span>
  <input type="range" id="tlSlider" min="0" max="20" value="20" step="1" style="width:160px;accent-color:var(--accent-gold);">
</div>
</body>
